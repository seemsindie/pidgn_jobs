name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Clone zzz_db dependency
        run: git clone https://github.com/seemsindie/zzz_db.git ../zzz_db
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0-dev.2905+5d71e3051
      - name: Install SQLite (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev
      - name: Build
        run: zig build
      - name: Test
        run: zig build test
